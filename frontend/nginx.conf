server {
    listen 80;
    server_name localhost;

    # app de react
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # redirige al ms ventas
    location /api/v1/ventas {
        proxy_pass http://examen-backend-ventas.examen.svc.cluster.local:8082/api/v1/ventas;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # redirige al ms despacho
    location /api/v1/despachos {
        proxy_pass http://examen-backend-despachos.examen.svc.cluster.local:8081/api/v1/despachos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
