version: '3.8'

services:
  back-despachos:
    image: 511164404052.dkr.ecr.us-east-1.amazonaws.com/back-despachos:despachos
    container_name: back-despachos-container
    ports:
      - "8081:8081"
    environment:
      - DB_ENDPOINT=10.0.5.66
      - DB_PORT=3306
      - DB_NAME=bd_examen
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - SPRING_DATASOURCE_URL=jdbc:mysql://10.0.5.66:3306/bd_evaluacion?allowPublicKeyRetrieval=true&useSSL=false
    restart: always
    networks:
      - eval-network

  back-ventas:
    image: 511164404052.dkr.ecr.us-east-1.amazonaws.com/back-despachos:ventas
    container_name: back-ventas-container
    ports:
      - "8082:8080"
    environment:
      - DB_ENDPOINT=10.0.5.66
      - DB_PORT=3306
      - DB_NAME=bd_examen
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - SPRING_DATASOURCE_URL=jdbc:mysql://10.0.5.66:3306/bd_evaluacion?allowPublicKeyRetrieval=true&useSSL=false
    restart: always
    networks:
      - eval-network

networks:
  eval-network:
    driver: bridge
