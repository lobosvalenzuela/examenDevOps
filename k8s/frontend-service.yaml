apiVersion: v1
kind: Service
metadata:
  name: examen-frontend
  namespace: examen
  annotations:
    # service.beta.kubernetes.io/aws-load-balancer-type: "external"
    # service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: examen-frontend  # Corregido de 'tienda-frontend' a 'examen-frontend'
  ports:
    - port: 80
      targetPort: 80
